<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SowetoStyle | Cart</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: #f5f5f5;
            color: #1a1a1a;
        }

        .top-bar {
            background: #0a0a0a;
            padding: 1.2rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            border-bottom: 1px solid #2a2a2a;
        }

        .logo {
            height: 40px;
            width: auto;
        }

        .continue-shopping {
            color: #ffffff;
            text-decoration: none;
            background: transparent;
            padding: 8px 18px;
            border-radius: 30px;
            transition: all 0.3s;
            font-weight: 500;
            border: 1px solid #b87c4f;
        }

        .continue-shopping:hover {
            background: #b87c4f;
            border-color: #b87c4f;
        }

        .cart-container {
            max-width: 1200px;
            margin: 60px auto;
            padding: 0 5%;
            display: grid;
            grid-template-columns: 1fr 1.5fr;
            gap: 3rem;
        }

        .cart-items h2, .order-summary h2 {
            font-size: 1.6rem;
            margin-bottom: 1.5rem;
            font-weight: 600;
            letter-spacing: -0.5px;
        }

        .cart-item {
            display: grid;
            grid-template-columns: 80px 1fr auto auto;
            gap: 1rem;
            background: white;
            padding: 1rem;
            border-radius: 12px;
            margin-bottom: 1rem;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
            align-items: center;
            border: 1px solid #eaeaea;
        }

        .cart-item-image {
            width: 70px;
            height: 70px;
            border-radius: 8px;
            object-fit: cover;
        }

        .cart-item-title {
            font-weight: 600;
            font-size: 0.9rem;
        }

        .cart-item-price {
            color: #b87c4f;
            font-weight: 700;
        }

        .cart-item-quantity {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .quantity-btn {
            background: #f0f0f0;
            border: none;
            width: 28px;
            height: 28px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }

        .quantity-btn:hover {
            background: #b87c4f;
            color: white;
        }

        .remove-item {
            color: #a0a0a0;
            cursor: pointer;
            text-decoration: none;
            font-size: 0.75rem;
            font-weight: 500;
            transition: color 0.2s;
            margin-left: 8px;
        }

        .remove-item:hover {
            color: #e63946;
        }

        .order-summary {
            background: white;
            padding: 1.8rem;
            border-radius: 16px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.06);
            height: fit-content;
            border: 1px solid #eaeaea;
        }

        .summary-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 1rem;
            padding-bottom: 0.75rem;
            border-bottom: 1px solid #efefef;
            font-size: 0.95rem;
        }

        .summary-total {
            font-size: 1.2rem;
            font-weight: 700;
            color: #b87c4f;
            margin-top: 1rem;
            padding-top: 1rem;
            border-top: 2px solid #efefef;
            display: flex;
            justify-content: space-between;
        }

        .checkout-btn {
            width: 100%;
            padding: 14px;
            background: #b87c4f;
            color: white;
            border: none;
            border-radius: 40px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-top: 1rem;
        }

        .checkout-btn:hover {
            background: #9b623c;
            transform: translateY(-2px);
            box-shadow: 0 6px 14px rgba(184,124,79,0.25);
        }

        .empty-cart {
            text-align: center;
            padding: 60px 20px;
            background: white;
            border-radius: 16px;
        }

        .empty-cart p {
            font-size: 1.2rem;
            color: #888;
            margin-bottom: 1rem;
        }

        .empty-cart a {
            background: #b87c4f;
            color: white;
            padding: 12px 30px;
            text-decoration: none;
            border-radius: 40px;
            display: inline-block;
        }

        footer {
            background: #0a0a0a;
            color: #8f8f8f;
            text-align: center;
            padding: 2rem;
            margin-top: 3rem;
            font-size: 0.85rem;
            border-top: 1px solid #1f1f1f;
        }

        .address-line {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-top: 0.5rem;
        }

        .location-icon {
            width: 14px;
            height: 14px;
        }

        @media (max-width: 768px) {
            .cart-container {
                grid-template-columns: 1fr;
                gap: 2rem;
            }
            .cart-item {
                grid-template-columns: 1fr;
                text-align: center;
            }
            .cart-item-image {
                margin: 0 auto;
            }
            .logo {
                height: 30px;
            }
        }
    </style>
</head>
<body>

    <div class="top-bar">
        <img src="LOGO2.PNG" alt="SowetoStyle" class="logo">
        <a href="shop.html" class="continue-shopping">Continue Shopping →</a>
    </div>

    <div class="cart-container" id="cartContainer">
        <div class="cart-items" id="cartItemsSection">
            <h2>Your Cart</h2>
            <div id="cartItemsList"></div>
        </div>

        <div class="order-summary" id="orderSummary">
            <h2>Order Summary</h2>
            <div class="summary-row">
                <span>Subtotal</span>
                <span id="subtotal">R0</span>
            </div>
            <div class="summary-row">
                <span>Delivery (Paxi)</span>
                <span>R100</span>
            </div>
            <div class="summary-total">
                <span>Total</span>
                <span id="total">R0</span>
            </div>
            <button class="checkout-btn" id="checkoutBtn">Proceed to Checkout</button>
        </div>
    </div>

    <footer>
        <p>SowetoStyle | It's The Life We Believe In</p>
        <div class="address-line">
            <svg class="location-icon" viewBox="0 0 24 24" fill="none" stroke="#8f8f8f" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path>
                <circle cx="12" cy="10" r="3"></circle>
            </svg>
            <span>353 Elias Motsoaledi Street, Mofolo South, Johannesburg</span>
        </div>
    </footer>

    <script>
        function getProductImage(productName) {
            const imageMap = {
                "Classic Soweto Style Jacket": "Classic Soweto Style Jacket.jpg",
                "Soweto Style Classic Beanie": "Soweto Style Classic Beanie.jpg",
                "Soweto Style Two Piece Denim": "Soweto Style Two Piece Denim.jpg",
                "Soweto Style Bucket Hat": "Soweto Style Bucket Hat.jpg",
                "Soweto Style Ladies Knitted Dress": "Soweto Style Ladies Knitted Dress.jpg",
                "Soweto Style Bennie": "Soweto Style Bennie.jpg",
                "Soweto Style Teddy T-Shirt": "Soweto Style Teddy T-Shirt.jpg",
                "Soweto Style Classic Sweater": "Soweto Style Classic Sweater.jpg",
                "Soweto Style Jacket London Spice": "Soweto Style Jacket London Spice.jpg",
                "Soweto Style Denim Shirt": "Soweto Style Denim Shirt.jpg",
                "Soweto Style Classic T-Shirt": "Soweto Style Classic T-Shirt.jpg"
            };
            return imageMap[productName] || "";
        }

        function loadCart() {
            const cart = JSON.parse(localStorage.getItem('cart')) || [];
            const cartItemsList = document.getElementById('cartItemsList');
            const subtotalSpan = document.getElementById('subtotal');
            const totalSpan = document.getElementById('total');
            const deliveryFee = 100;
            
            if (cart.length === 0) {
                cartItemsList.innerHTML = '<div class="empty-cart"><p>Your cart is empty</p><a href="shop.html">Start Shopping</a></div>';
                subtotalSpan.innerText = 'R0';
                totalSpan.innerText = 'R' + deliveryFee;
                return;
            }
            
            let html = '';
            let subtotal = 0;
            
            cart.forEach(item => {
                const itemTotal = item.price * item.quantity;
                subtotal += itemTotal;
                const colorSize = item.color && item.size ? ` (${item.color}, ${item.size})` : '';
                const imageSrc = getProductImage(item.name);
                html += `
                    <div class="cart-item" data-id="${item.id}" data-color="${item.color || ''}" data-size="${item.size || ''}">
                        <img src="${imageSrc}" class="cart-item-image" onerror="this.src=''">
                        <div class="cart-item-title">${item.name}${colorSize}</div>
                        <div class="cart-item-price">R${item.price}</div>
                        <div class="cart-item-quantity">
                            <button class="quantity-btn" data-id="${item.id}" data-color="${item.color || ''}" data-size="${item.size || ''}" data-change="-1">-</button>
                            <span>${item.quantity}</span>
                            <button class="quantity-btn" data-id="${item.id}" data-color="${item.color || ''}" data-size="${item.size || ''}" data-change="1">+</button>
                            <a href="#" class="remove-item" data-id="${item.id}" data-color="${item.color || ''}" data-size="${item.size || ''}">Remove</a>
                        </div>
                    </div>
                `;
            });
            
            cartItemsList.innerHTML = html;
            subtotalSpan.innerText = 'R' + subtotal.toLocaleString();
            const total = subtotal + deliveryFee;
            totalSpan.innerText = 'R' + total.toLocaleString();
            
            document.querySelectorAll('.quantity-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const id = btn.getAttribute('data-id');
                    const color = btn.getAttribute('data-color');
                    const size = btn.getAttribute('data-size');
                    const change = parseInt(btn.getAttribute('data-change'));
                    updateQuantity(id, color, size, change);
                });
            });
            
            document.querySelectorAll('.remove-item').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.preventDefault();
                    const id = btn.getAttribute('data-id');
                    const color = btn.getAttribute('data-color');
                    const size = btn.getAttribute('data-size');
                    removeItem(id, color, size);
                });
            });
        }
        
        function updateQuantity(productId, color, size, change) {
            let cart = JSON.parse(localStorage.getItem('cart')) || [];
            const itemIndex = cart.findIndex(item => item.id == productId && item.color === color && item.size === size);
            
            if (itemIndex !== -1) {
                const newQuantity = cart[itemIndex].quantity + change;
                if (newQuantity <= 0) {
                    cart.splice(itemIndex, 1);
                } else {
                    cart[itemIndex].quantity = newQuantity;
                }
                localStorage.setItem('cart', JSON.stringify(cart));
                loadCart();
            }
        }
        
        function removeItem(productId, color, size) {
            let cart = JSON.parse(localStorage.getItem('cart')) || [];
            cart = cart.filter(item => !(item.id == productId && item.color === color && item.size === size));
            localStorage.setItem('cart', JSON.stringify(cart));
            loadCart();
        }
        
        document.getElementById('checkoutBtn').addEventListener('click', () => {
            const cart = JSON.parse(localStorage.getItem('cart')) || [];
            if (cart.length === 0) {
                alert('Your cart is empty');
                return;
            }
            window.location.href = 'checkout.html';
        });
        
        loadCart();
    </script>
</body>
</html>
